<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация сотрудника - WorldCashBox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .secret-key-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>WorldCashBox</h1>
            <p>Регистрация сотрудника</p>
        </div>

        <div id="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Имя и фамилия *</label>
                <input type="text" id="name" name="name" required placeholder="Иван Иванов">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="support@worldcashbox.ru">
            </div>

            <div class="form-group">
                <label for="password">Пароль *</label>
                <input type="password" id="password" name="password" required placeholder="Минимум 6 символов" minlength="6">
            </div>

            <div class="form-group">
                <label for="role">Роль *</label>
                <select id="role" name="role" required>
                    <option value="support">Поддержка (Support)</option>
                    <option value="manager">Менеджер (Manager)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="secretKey">Секретный ключ *</label>
                <input type="password" id="secretKey" name="secretKey" required placeholder="Секретный ключ для регистрации">
                <div class="secret-key-hint">
                    Секретный ключ задается в переменной окружения STAFF_REGISTRATION_KEY
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Зарегистрировать
            </button>
        </form>

        <div class="footer">
            <p>WorldCashBox © 2024</p>
            <p>Автоматизация бизнеса</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const alertDiv = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');

        function showAlert(message, type = 'error') {
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, type === 'success' ? 5000 : 10000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                password: formData.get('password'),
                role: formData.get('role'),
                secretKey: formData.get('secretKey')
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Регистрация...';

            try {
                const response = await fetch('/api/staff/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert(
                        `✅ Аккаунт успешно создан!<br><br>` +
                        `ID: ${result.staff.id}<br>` +
                        `Email: ${result.staff.email}<br>` +
                        `Имя: ${result.staff.name}<br>` +
                        `Роль: ${result.staff.role}`,
                        'success'
                    );
                    form.reset();
                } else {
                    const errorMsg = result.error || result.details || 'Неизвестная ошибка';
                    console.error('Registration error:', result);
                    showAlert(`❌ Ошибка: ${errorMsg}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Ошибка подключения: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Зарегистрировать';
            }
        });
    </script>
</body>
</html>
