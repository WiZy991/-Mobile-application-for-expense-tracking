version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Монтируем папку с загрузками (чтобы файлы сохранялись при перезапуске)
      - ./uploads:/app/uploads
      # Монтируем .env файл (опционально, можно использовать только env_file)
      - ./.env:/app/.env:ro
    # Если используете удаленную MySQL (например, на Beget), не нужен depends_on
    # depends_on:
    #   - postgres
    networks:
      - billing-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL (закомментировано, так как используется удаленная MySQL на Beget)
  # Раскомментируйте, если нужна локальная PostgreSQL
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: billing-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: ${DB_NAME:-billing_db}
  #     POSTGRES_USER: ${DB_USER:-billing_user}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePassword123}
  #     PGDATA: /var/lib/postgresql/data/pgdata
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - billing-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-billing_user} -d ${DB_NAME:-billing_db}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Nginx reverse proxy (опционально, для продакшн)
  nginx:
    image: nginx:alpine
    container_name: billing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - billing-network

# Volumes не нужны, так как используется удаленная MySQL на Beget
# Если понадобится локальная PostgreSQL, раскомментируйте:
# volumes:
#   postgres_data:
#     driver: local

networks:
  billing-network:
    driver: bridge
